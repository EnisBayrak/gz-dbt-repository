version: 2

sources:
  - name: raw
    schema: gz_raw_data
    tables:
      # ==========================================
      # 1. SALES TABLOSU (Satış Verileri & Tazelik Testi)
      # ==========================================
      - name: sales
        identifier: raw_gz_sales
        description: "Greenweez e-ticaret satış verileri. Her satır bir siparişteki benzersiz bir ürünü temsil eder."
        
        

        columns:
          - name: date_date
            description: "Satışın gerçekleştiği günün tarihi (YYYY-MM-DD)."
          - name: orders_id
            description: "Benzersiz sipariş numarası."
          - name: pdt_id
            description: "Benzersiz ürün numarası."
          - name: revenue
            description: "Satıştan elde edilen toplam ciro/gelir."
          - name: quantity
            description: "Satılan ürün adedi."
            
        # Birincil Anahtar Testi (orders_id ve products_id kombinasyonu)
        tests:
          - unique:
              column_name: "orders_id || '-' || pdt_id"

      # ==========================================
      # 2. PRODUCT TABLOSU (Ürün Kataloğu & Tekli Testler)
      # ==========================================
      - name: product
        identifier: raw_gz_product
        description: "Ürün kataloğu ve maliyet bilgileri."
        columns:
          - name: products_id
            description: "Ürünün benzersiz ID'si. Bu tablonun birincil anahtarıdır."
            tests:
              - unique
              - not_null
          - name: purchSE_PRICE
            description: "Ürünün tedarik/satın alma fiyatı."

      # ==========================================
      # 3. SHIP TABLOSU (Kargo Verileri & Tekli Testler)
      # ==========================================
      - name: ship
        identifier: raw_gz_ship
        description: "Siparişlerin kargo ve lojistik maliyet verileri."
        columns:
          - name: orders_id
            description: "Siparişin benzersiz ID'si. Bu tablonun birincil anahtarıdır."
            tests:
              - unique
              - not_null
          - name: shipping_fee
            description: "Müşteriden tahsil edilen kargo ücreti."
          - name: logcost
            description: "Siparişin lojistik operasyon maliyeti."
          - name: ship_cost
            description: "Gerçek kargo gönderim maliyeti."
      - name: adwords
        identifier: raw_gz_adwords
        description: "adwords verileri."
        columns:
          - name: date_date
            description: "Tarihi gösterir."
            
          - name: paid_source
            description: "Kaynak ödemesi."
          - name: campaign_key
            description: "Campaign anahtarı."
            tests:
              - unique
              - not_null
          - name: camPGN_name
            description: "Campaign adı."
          - name: ads_cost
            description: "Reklam Maliyeti."
            tests:
              - not_null
              
          - name: impression
            description: "Görüntülenme."
          - name: click
            description: "Tıklanma sayısı."
      - name: facebook
        identifier: raw_gz_facebook
        description: "facebook verileri."
        columns:
          - name: date_date
            description: "Tarihi gösterir."
            
          - name: paid_source
            description: "Kaynak ödemesi."
          - name: campaign_key
            description: "Campaign anahtarı."
            tests:
              - unique
              - not_null
          - name: camPGN_name
            description: "Campaign adı."
          - name: ads_cost
            description: "Reklam Maliyeti."
            tests:
              - not_null
              
          - name: impression
            description: "Görüntülenme."
          - name: click
            description: "Tıklanma sayısı."
      - name: bing
        identifier: raw_gz_bing
        description: "bing verileri."
        columns:
          - name: date_date
            description: "Tarihi gösterir."
            
          - name: paid_source
            description: "Kaynak ödemesi."
          - name: campaign_key
            description: "Campaign anahtarı."
            tests:
              - unique
              - not_null
              
              
          - name: camPGN_name
            description: "Campaign adı."
          - name: ads_cost
            description: "Reklam Maliyeti."
            tests:
              - not_null
              
          - name: impression
            description: "Görüntülenme."
          - name: click
            description: "Tıklanma sayısı."
      - name: criteo
        identifier: raw_gz_criteo
        description: "criteo verileri."
        columns:
          - name: date_date
            description: "Tarihi gösterir."
            
          - name: paid_source
            description: "Kaynak ödemesi."
          - name: campaign_key
            description: "Campaign anahtarı."
            tests:
              - unique
              - not_null
          - name: camPGN_name
            description: "Campaign adı."
          - name: ads_cost
            description: "Reklam Maliyeti."
            tests:
              - not_null
              
          - name: impression
            description: "Görüntülenme."
          - name: click
